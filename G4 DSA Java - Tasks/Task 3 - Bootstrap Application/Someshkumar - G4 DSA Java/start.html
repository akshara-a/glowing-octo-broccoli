<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">Tech Store</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Products</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero text-center">
<div class="container">
<h1>Welcome To Tech Store</h1>
<p>Find the Best Electronics at Amazing Prices</p>
<button class="btn btn-light mt-3" onclick="toggleDarkMode()">Toggle Dark Mode</button>
</div>
</section>

<div class="container my-5">
<div class="row g-4">

<div class="col-md-4">
<div class="card product-card h-100">
<img src="https://images.stockcake.com/public/2/d/5/2d5d4097-fb7a-4679-b987-3a92ae094d73_large/smartphones-display-variety-stockcake.jpg" class="card-img-top" alt="Smart Phone">
<div class="card-body text-center">
<h5 class="card-title">Samsung Galaxy M33</h5>
<p class="card-text">₹20,000</p>
<button class="btn btn-primary" onclick="addToCart(20000)">Add To Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card product-card h-100">
<img src="https://plus.unsplash.com/premium_photo-1678099940967-73fe30680949?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8d2lyZWxlc3MlMjBoZWFkcGhvbmVzfGVufDB8fDB8fHww" class="card-img-top" alt="Wireless Headphones">
<div class="card-body text-center">
<h5 class="card-title">Wireless Headphones</h5>
<p class="card-text">₹3,000</p>
<button class="btn btn-primary" onclick="addToCart(3000)">Add To Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card product-card h-100">
<img src="https://static.vecteezy.com/system/resources/thumbnails/070/073/657/small/smart-watches-displayed-connectivity-and-wearable-tech-photo.jpg" class="card-img-top" alt="Smart Watch">
<div class="card-body text-center">
<h5 class="card-title">Smart Watch</h5>
<p class="card-text">₹5,000</p>
<button class="btn btn-primary" onclick="addToCart(5000)">Add To Cart</button>
</div>
</div>
</div>
</div>
</div>
<div class="container text-center mb-5">
<div class="card p-4 shadow">
<h3>Cart Summary</h3>
<h5>Items in Cart: <span id="cartCount">0</span></h5>
<h5>Total Price: ₹<span id="totalPrice">0</span></h5>
</div>
</div>

<footer class="bg-dark text-white text-center p-3">
<p class="mb-0">© 2026 Tech Store. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
