<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulma Profile Card</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero is-primary">
        <div class="hero-body">
            <p class="title">
                Student Profile
            </p>
            <p class="subtitle">
                Bulma CSS Application
            </p>
        </div>
    </section>

    <div class="container mt-6">

        <div class="card">

            <div class="card-content">

                <p class="title is-4">
                    Aryasree K
                </p>

                <p class="subtitle is-6">
                    Electronics & Communication Engineering
                </p>

                <div class="content">
                    Interested in Embedded Systems,
                    FPGA Design and Firmware Development.
                </div>

                <div class="tags">
                    <span class="tag is-info">C</span>
                    <span class="tag is-success">Python</span>
                    <span class="tag is-warning">Verilog</span>
                    <span class="tag is-danger">FPGA</span>
                </div>

                <button class="button is-primary">
                    Contact
                </button>

            </div>

        </div>

    </div>

</body>
</html>
