<!DOCTYPE html>
<html>
<head>
<title>Dashboard Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="container mt-5">

<h2>Dashboard Summary</h2>


<div class="row">


<div class="col-md-3">

<div class="card custom-card">

<h2>👤</h2>

<h5>Total Users</h5>

<p>5000</p>

</div>

</div>



<div class="col-md-3">

<div class="card custom-card">

<h2>📦</h2>

<h5>Total Orders</h5>

<p>1200</p>

</div>

</div>




<div class="col-md-3">

<div class="card custom-card">

<h2>💰</h2>

<h5>Revenue</h5>

<p>$25000</p>

</div>

</div>




<div class="col-md-3">

<div class="card custom-card">

<h2>⏳</h2>

<h5>Pending Tasks</h5>

<p>45</p>

</div>

</div>


</div>

</div>


</body>
</html>
