<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: bold;
            color: white !important;
        }

        .nav-link {
            color: white !important;
            margin: 0 8px;
            transition: all 0.3s ease;
        }

        /* Hover Effect */
        .nav-link:hover {
            color: #ffd700 !important;
            transform: translateY(-2px);
        }

        .login-btn {
            border-radius: 25px;
            padding: 6px 18px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #ffd700;
            color: #000;
            border-color: #ffd700;
        }
    </style>
</head>
<body>

    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand" href="#">HERO</a>

            <!-- Hamburger Menu -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>

                <!-- Login Button -->
                <button class="btn btn-outline-light login-btn">
                    Login
                </button>

            </div>
        </div>
    </nav>
    <!-- Navbar End -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 50px 0;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .hero p {
            font-size: 1.1rem;
            margin: 20px 0;
        }

        .btn-primary-custom {
            background-color: #fff;
            color: #007bff;
            border: none;
            padding: 10px 25px;
            font-weight: 600;
        }

        .btn-primary-custom:hover {
            background-color: #f1f1f1;
        }

        .btn-secondary-custom {
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 25px;
            font-weight: 600;
        }

        .btn-secondary-custom:hover {
            background-color: #fff;
            color: #007bff;
        }

        .image-placeholder {
            height: 350px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px dashed #fff;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .hero {
                text-align: center;
            }

            .hero h1 {
                font-size: 2.3rem;
            }

            .image-placeholder {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="row align-items-center">

                <!-- Left Content -->
                <div class="col-md-6">
                    <h1>Grow Your Business Faster</h1>
                    <p>
                        Discover innovative solutions that help your business
                        reach new heights. Start your journey today with our
                        powerful platform.
                    </p>

                    <a href="#" class="btn btn-primary-custom me-2">
                        Get Started
                    </a>

                    <a href="#" class="btn btn-secondary-custom">
                        Learn More
                    </a>
                </div>

                <!-- Right Image -->
                <div class="col-md-6">
                    <div class="image-placeholder">
                        Image Placeholder
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
