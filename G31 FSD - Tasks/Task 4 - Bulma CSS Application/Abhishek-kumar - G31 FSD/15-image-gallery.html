<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 15 - Image Gallery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #ffffff; padding: 3rem 0; }
  .gallery-title { font-weight: 700; color: #1b2a4a; text-align: center; margin-bottom: 2rem; }
  .gallery-item { border-radius: 0.8rem; overflow: hidden; position: relative; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .gallery-item img { width: 100%; height: 220px; object-fit: cover; transition: transform 0.35s ease; display: block; }
  .gallery-item:hover img { transform: scale(1.08); }
  .gallery-caption { padding: 0.6rem 0.8rem; background-color: #fff; color: #4a5568; font-size: 0.9rem; font-weight: 500; text-align: center; }
</style>
</head>
<body>

<div class="container">
  <h3 class="gallery-title">Photo Gallery</h3>
  <div class="row g-4">

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (4).jpg" alt="Mountains">
        <div class="gallery-caption">Mountains</div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (5).jpg" alt="Beach">
        <div class="gallery-caption">Beach</div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (7).jpg" alt="Forest">
        <div class="gallery-caption">Forest</div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (6).jpg" alt="City">
        <div class="gallery-caption">City</div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (8).jpg" alt="Desert">
        <div class="gallery-caption">Desert</div>
      </div>
    </div>

    <div class="col-md-4 col-sm-6">
      <div class="gallery-item">
        <img src="Image/images (9).jpg" alt="Lake">
        <div class="gallery-caption">Lake</div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
