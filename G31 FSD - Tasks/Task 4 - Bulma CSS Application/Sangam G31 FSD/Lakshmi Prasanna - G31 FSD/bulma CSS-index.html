<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Feedback Form</title>

    <!-- Bulma CSS -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar is-primary">
    <div class="navbar-brand">
        <a class="navbar-item has-text-weight-bold">
            Feedback Portal
        </a>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero is-info">
    <div class="hero-body has-text-centered">
        <p class="title">Customer Feedback Form</p>
        <p class="subtitle">We value your feedback.</p>
    </div>
</section>

<!-- Form -->
<section class="section">
<div class="container">

<div class="box">

<h2 class="title is-4 has-text-centered">Feedback Form</h2>

<div class="field">
<label class="label">Full Name</label>
<div class="control">
<input class="input" type="text" placeholder="Enter your name">
</div>
</div>

<div class="field">
<label class="label">Email</label>
<div class="control">
<input class="input" type="email" placeholder="Enter your email">
</div>
</div>

<div class="field">
<label class="label">Rating</label>
<div class="control">
<div class="select is-fullwidth">
<select>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>
</div>
</div>

<div class="field">
<label class="label">Feedback</label>
<div class="control">
<textarea class="textarea" placeholder="Write your feedback"></textarea>
</div>
</div>

<div class="field has-text-centered">
<button class="button is-primary">
Submit Feedback
</button>
</div>

</div>

</div>
</section>

<!-- Footer -->
<footer class="footer has-background-primary has-text-white">
<div class="content has-text-centered">
<p>© 2026 Customer Feedback Portal</p>
</div>
</footer>

</body>
</html>
