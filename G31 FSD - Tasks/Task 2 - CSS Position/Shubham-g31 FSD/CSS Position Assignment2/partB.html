<!DOCTYPE html>
<html>
<head>
 <style>
    /* Part B: Relative Position */
.box {
  width: 120px;
  height: 80px;
  margin: 10px;
  color: white;
  text-align: center;
  line-height: 80px;
}

.box1 {
  background-color: red;
}

.box2 {
  position: relative;   /* relative positioning */
  top: 20px;            /* moves 20px down */
  left: 40px;           /* moves 40px right */
  background-color: blue;
}

.box3 {
  background-color: green;
}

 </style>
</head>
<body>
  <div class="box box1">Box 1</div>
  <div class="box box2">Box 2 (Relative)</div>
  <div class="box box3">Box 3</div>
  <p>Observation: The blue box moved 40px right and 20px down but its original space is still reserved.</p>
</body>
</html>
