
<!DOCTYPE html>
<html>
<head>
<style>
    /* Example 1: Parent + Child */
.parent {
  position: relative;
  width: 300px;
  height: 200px;
  background-color: lightgray;
  margin-bottom: 30px;
}
.child {
  position: absolute;
  top: 0;
  right: 0;
  width: 120px;
  height: 80px;
  background-color: blue;
  color: white;
  text-align: center;
  line-height: 80px;
}

/* Example 2: Notification Badge */
.image-container {
  position: relative;
  display: inline-block;
}
.badge {
  position: absolute;
  top: 0;
  right: 0;
  background-color: red;
  color: white;
  border-radius: 50%;
  padding: 5px 10px;
  font-size: 12px;
}
</style>
</head>
<body>
  <h2>Example 1: Parent + Child Box</h2>
  <div class="parent">
    Parent Container
    <div class="child">Child Box</div>
  </div>
  <hr>

  <h2>Example 2: Notification Badge on Image</h2>
  <div class="image-container">
    <div style="width:120px;height:120px;background:rgb(234, 8, 197);"></div>
    <div class="badge">5</div>
 
    
    
  </div>
</body>
</html>
