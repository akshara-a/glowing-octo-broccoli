<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:100px;
    height:100px;
    margin:10px;
    background:rgb(59, 59, 150);
}

.static-box{
    position:static;
    top:50px;
    left:50px;
    background:rgb(155, 45, 157);
}
</style>
</head>
<body>

<div class="box">Box 1</div>
<div class="box static-box">Box 2</div>
<div class="box">Box 3</div>

</body>
</html>
