 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static Position Example</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="container">
        <div class="box">Box 1</div>

        <div class="box static-box">
            Box 2 (Static)
        </div>

        <div class="box">Box 3</div>
    </div>

    <p>
        Note: Box 2 par position: static ke saath top: 50px aur left: 50px
        apply kiya gaya hai, lekin koi movement nahi hogi.
    </p>

</body>
</html>
