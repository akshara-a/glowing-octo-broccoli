<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wearher Dashboard</title>
    <link rel="stylesheet" href="rahman.css" />
</head>
<body>

    <div class="container">

        <h1>🌤 Weather Dashboard</h1>

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name"
            >

            <button id="searchBtn">
                Search
            </button>

        </div>

        <p id="loading"></p>

        <div id="weatherResult">

            <h2 id="city"></h2>

            <p id="temperature"></p>

            <p id="condition"></p>

            <p id="description"></p>

            <p id="humidity"></p>

            <p id="windSpeed"></p>

        </div>

        <p id="error"></p>

    </div>

    <script src="config.js"></script>
    <script src="rahman.js"></script>

</body>
</html>
