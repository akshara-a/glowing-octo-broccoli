<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Search App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#141E30,#243B55);
}

.container{
    width:380px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

h1{
    color:#243B55;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #243B55;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff416c;
}

.movie-card{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:12px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.movie-card img{
    width:180px;
    border-radius:10px;
    margin-bottom:15px;
}

.movie-card h2{
    color:#243B55;
    margin-bottom:10px;
}

.movie-card p{
    margin:8px 0;
    color:#444;
}
</style>

</head>
<body>

<div class="container">
    <h1>🎬 Movie Search</h1>

    <input type="text" id="movie" placeholder="Enter Movie Name">

    <button onclick="searchMovie()">Search Movie</button>

    <div id="result" class="movie-card"></div>
</div>

<script src="script.js"></script>

</body>
</html>
