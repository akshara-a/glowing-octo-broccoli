<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Summary Card</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="order-section d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          
          <div class="card order-card shadow">
            <div class="card-body p-4">
              <h2 class="text-center fw-bold mb-4">Order Summary</h2>

              <!-- Product details -->
              <div class="d-flex justify-content-between mb-3">
                <span class="label">Product Name</span>
                <span class="value">Wireless Headphones</span>
              </div>

              <div class="d-flex justify-content-between mb-3">
                <span class="label">Quantity</span>
                <span class="value">2</span>
              </div>

              <div class="d-flex justify-content-between mb-3">
                <span class="label">Price</span>
                <span class="value">₹2,500</span>
              </div>

              <div class="d-flex justify-content-between mb-3">
                <span class="label">Discount</span>
                <span class="discount">- ₹500</span>
              </div>

              <hr>

              <div class="d-flex justify-content-between mb-4 total-row">
                <span>Total Amount</span>
                <span>₹4,500</span>
              </div>

              <!-- Checkout button -->
              <div class="text-center">
                <button class="btn checkout-btn">Proceed to Checkout</button>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
