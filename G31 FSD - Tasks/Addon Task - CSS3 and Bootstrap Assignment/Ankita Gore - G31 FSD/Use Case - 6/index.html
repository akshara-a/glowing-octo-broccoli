<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="product-section d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">

          <div class="card product-card shadow">
            <!-- Product Image -->
            <img 
              src="https://static0.gamerantimages.com/wordpress/wp-content/uploads/2023/06/logitechgprox2wireless-1.jpg" 
              class="card-img-top product-img" 
              alt="Product Image"
            >

            <div class="card-body text-center">
              <!-- Product Title -->
              <h4 class="card-title mb-2">Wireless Headphones</h4>

              <!-- Price -->
              <p class="price-text mb-2">₹2,499</p>

              <!-- Rating -->
              <span class="badge rating-badge mb-3">⭐ 4.5 / 5</span>

              <!-- Add to Cart Button -->
              <div>
                <a href="#" class="btn btn-primary cart-btn">Add to Cart</a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
