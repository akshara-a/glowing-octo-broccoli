<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Messages</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="alerts-section py-5">
    <div class="container">
      <div class="alerts-card shadow">
        <div class="text-center mb-4">
          <h1 class="fw-bold">Alert Messages</h1>
          <p class="text-muted mb-0">Examples of success, error, warning, and info alerts</p>
        </div>

        <!-- Success Alert -->
        <div class="alert alert-success alert-dismissible fade show d-flex align-items-center custom-alert" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          <div><strong>Success!</strong> Your changes have been saved successfully.</div>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center custom-alert" role="alert">
          <i class="bi bi-x-circle-fill me-2"></i>
          <div><strong>Error!</strong> Something went wrong. Please try again.</div>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Warning Alert -->
        <div class="alert alert-warning alert-dismissible fade show d-flex align-items-center custom-alert" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <div><strong>Warning!</strong> Please check your input before continuing.</div>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Info Alert -->
        <div class="alert alert-info alert-dismissible fade show d-flex align-items-center custom-alert" role="alert">
          <i class="bi bi-info-circle-fill me-2"></i>
          <div><strong>Info:</strong> New updates are available for your dashboard.</div>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

      </div>
    </div>
  </section>

  <!-- Bootstrap JS for dismiss button -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
