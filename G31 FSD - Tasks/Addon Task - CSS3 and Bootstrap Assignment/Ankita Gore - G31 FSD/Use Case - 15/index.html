<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Gallery</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="gallery-section py-5">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="fw-bold text-white">Image Gallery</h1>
        <p class="text-light mb-0">Responsive gallery with hover zoom effect</p>
      </div>

      <div class="row g-4">

        <!-- Image 1 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://tse2.mm.bing.net/th/id/OIP.JVOhjP8QiaUG4y7IifKA9AHaEK?pid=Api&P=0&h=180" alt="Gallery Image 1" class="gallery-img">
            </div>
            <p class="gallery-caption">Beautiful Nature View</p>
          </div>
        </div>

        <!-- Image 2 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://images.squarespace-cdn.com/content/v1/52f29591e4b0d3acccdd6286/1591996873805-5N63PLGBH9M0BHYDTDWA/Matera+outdoor+adventure+hike+olympics+lifestyle+couple+dhb37-139.jpg" alt="Gallery Image 2" class="gallery-img">
            </div>
            <p class="gallery-caption">Mountain Adventure</p>
          </div>
        </div>

        <!-- Image 3 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://tse1.mm.bing.net/th/id/OIP.OgqYced1E8uw3uKE2w88OgHaEK?pid=Api&P=0&h=180" alt="Gallery Image 3" class="gallery-img">
            </div>
            <p class="gallery-caption">City Lights at Night</p>
          </div>
        </div>

        <!-- Image 4 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://www.scottsmorraphotography.com/images/xl/Poolenalena-Beach-Sunset-Palms-Waves-Maui-.jpg" alt="Gallery Image 4" class="gallery-img">
            </div>
            <p class="gallery-caption">Sunset by the Beach</p>
          </div>
        </div>

        <!-- Image 5 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://tse2.mm.bing.net/th/id/OIP.Ll6UD70XWje5LJzTtF99rQHaDt?pid=Api&P=0&h=180" alt="Gallery Image 5" class="gallery-img">
            </div>
            <p class="gallery-caption">Calm Forest Path</p>
          </div>
        </div>

        <!-- Image 6 -->
        <div class="col-sm-6 col-lg-4">
          <div class="gallery-card shadow-sm">
            <div class="gallery-img-wrapper">
              <img src="https://tse4.mm.bing.net/th/id/OIP.rH1yfydJLiq56oXsDzu0yQHaE6?pid=Api&P=0&h=180" alt="Gallery Image 6" class="gallery-img">
            </div>
            <p class="gallery-caption">Modern Architecture</p>
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
