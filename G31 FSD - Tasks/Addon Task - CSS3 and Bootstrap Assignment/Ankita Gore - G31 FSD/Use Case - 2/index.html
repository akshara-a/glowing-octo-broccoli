<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Section</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hero Section Start -->
  <section class="hero-section d-flex align-items-center">
    <div class="container">
      <div class="row align-items-center g-4">
        
        <!-- Left Content -->
        <div class="col-lg-6 col-md-12 text-center text-lg-start">
          <h1 class="hero-title">Build Your Dream Website</h1>
          <p class="hero-text">
            Create modern, responsive, and attractive websites using HTML, CSS,
            Bootstrap, and JavaScript. Start your web development journey today.
          </p>

          <div class="hero-buttons d-flex flex-column flex-sm-row justify-content-center justify-content-lg-start gap-3 mt-4">
            <a href="#" class="btn btn-primary custom-btn px-4 py-2">Get Started</a>
            <a href="#" class="btn btn-outline-light custom-btn px-4 py-2">Learn More</a>
          </div>
        </div>

        <!-- Right Image Placeholder -->
        <div class="col-lg-6 col-md-12 text-center">
          <div class="image-placeholder mx-auto">
            <span>Image Placeholder</span>
          </div>
        </div>

      </div>
    </div>
  </section>
  <!-- Hero Section End -->

</body>
</html>
