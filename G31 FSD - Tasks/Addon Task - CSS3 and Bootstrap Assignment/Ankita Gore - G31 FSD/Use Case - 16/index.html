<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bars</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="progress-section py-5">
    <div class="container">
      <div class="progress-card shadow">
        <div class="text-center mb-4">
          <h1 class="fw-bold">Skill Progress</h1>
          <p class="text-muted mb-0">Track proficiency levels in different technologies</p>
        </div>

        <!-- HTML -->
        <div class="skill-item mb-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="skill-label">HTML</span>
            <span class="skill-percent">90%</span>
          </div>
          <div class="progress">
            <div class="progress-bar html-bar" style="width: 90%;">90%</div>
          </div>
        </div>

        <!-- CSS -->
        <div class="skill-item mb-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="skill-label">CSS</span>
            <span class="skill-percent">85%</span>
          </div>
          <div class="progress">
            <div class="progress-bar css-bar" style="width: 85%;">85%</div>
          </div>
        </div>

        <!-- Bootstrap -->
        <div class="skill-item mb-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="skill-label">Bootstrap</span>
            <span class="skill-percent">80%</span>
          </div>
          <div class="progress">
            <div class="progress-bar bootstrap-bar" style="width: 80%;">80%</div>
          </div>
        </div>

        <!-- JavaScript -->
        <div class="skill-item mb-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="skill-label">JavaScript</span>
            <span class="skill-percent">70%</span>
          </div>
          <div class="progress">
            <div class="progress-bar js-bar" style="width: 70%;">70%</div>
          </div>
        </div>

        <!-- C# -->
        <div class="skill-item">
          <div class="d-flex justify-content-between mb-2">
            <span class="skill-label">C#</span>
            <span class="skill-percent">65%</span>
          </div>
          <div class="progress">
            <div class="progress-bar csharp-bar" style="width: 65%;">65%</div>
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
