<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="register-section d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">
          
          <div class="register-card shadow">
            <h2 class="text-center mb-4">Create Account</h2>

            <form>
              <!-- Full Name -->
              <div class="mb-3">
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" class="form-control custom-input" id="fullname" placeholder="Enter your full name">
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control custom-input" id="email" placeholder="Enter your email">
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control custom-input" id="password" placeholder="Enter password">
                <div class="form-text">Password must be at least 8 characters long.</div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control custom-input" id="confirmPassword" placeholder="Confirm your password">
                <div class="invalid-feedback d-block">
                  Please make sure both passwords match.
                </div>
              </div>

              <!-- Terms Checkbox -->
              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label" for="terms">
                  I agree to the Terms and Conditions
                </label>
              </div>

              <!-- Register Button -->
              <button type="submit" class="btn btn-primary w-100 register-btn">Register</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
