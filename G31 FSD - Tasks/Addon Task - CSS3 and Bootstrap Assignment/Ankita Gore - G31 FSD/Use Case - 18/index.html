<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb and Pagination</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="nav-section py-5">
    <div class="container">
      <div class="nav-card shadow">

        <!-- Heading -->
        <div class="text-center mb-4">
          <h1 class="fw-bold">Listing Page Navigation</h1>
          <p class="text-muted mb-0">Breadcrumb and pagination example</p>
        </div>

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item"><a href="#">Products</a></li>
            <li class="breadcrumb-item active" aria-current="page">Electronics</li>
          </ol>
        </nav>

        <!-- Dummy content -->
        <div class="listing-box text-center mb-4">
          <h3>Electronics Listing</h3>
          <p>
            This page shows sample products from the Electronics category.
            Use breadcrumb for navigation and pagination for page switching UI.
          </p>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation">
          <ul class="pagination justify-content-center">

            <li class="page-item">
              <a class="page-link" href="javascript:void(0)">Previous</a>
            </li>

            <li class="page-item">
              <a class="page-link" href="javascript:void(0)">1</a>
            </li>

            <li class="page-item active" aria-current="page">
              <a class="page-link" href="javascript:void(0)">2</a>
            </li>

            <li class="page-item">
              <a class="page-link" href="javascript:void(0)">3</a>
            </li>

            <li class="page-item">
              <a class="page-link" href="javascript:void(0)">Next</a>
            </li>

          </ul>
        </nav>

      </div>
    </div>
  </section>

</body>
</html>
