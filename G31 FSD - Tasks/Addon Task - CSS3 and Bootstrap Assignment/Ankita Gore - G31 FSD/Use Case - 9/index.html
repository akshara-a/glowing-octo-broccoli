<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="contact-section d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <div class="contact-card shadow">
            <div class="text-center mb-4">
              <h1 class="fw-bold">Contact Us</h1>
              <p class="text-muted mb-0">We would love to hear from you</p>
            </div>

            <form>
              <!-- Name -->
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control custom-input" id="name" placeholder="Enter your name" required>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control custom-input" id="email" placeholder="Enter your email" required>
              </div>

              <!-- Subject -->
              <div class="mb-3">
                <label for="subject" class="form-label">Subject</label>
                <input type="text" class="form-control custom-input" id="subject" placeholder="Enter subject" required>
              </div>

              <!-- Message -->
              <div class="mb-4">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control custom-input" id="message" rows="5" placeholder="Write your message" required></textarea>
              </div>

              <!-- Submit button -->
              <div class="text-center">
                <button type="submit" class="btn submit-btn">Submit</button>
              </div>
            </form>

          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
