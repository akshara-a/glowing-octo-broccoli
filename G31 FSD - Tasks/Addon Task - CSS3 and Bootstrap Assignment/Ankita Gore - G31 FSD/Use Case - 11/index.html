<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Stat Cards</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="dashboard-section py-5">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="fw-bold text-white">Dashboard Overview</h1>
        <p class="text-light mb-0">Quick summary of platform statistics</p>
      </div>

      <div class="row g-4">

        <!-- Total Users -->
        <div class="col-md-6 col-lg-3">
          <div class="card stat-card users-card shadow-sm">
            <div class="card-body">
              <div class="icon-circle">U</div>
              <h5 class="stat-title">Total Users</h5>
              <h2 class="stat-number">12,450</h2>
            </div>
          </div>
        </div>

        <!-- Total Orders -->
        <div class="col-md-6 col-lg-3">
          <div class="card stat-card orders-card shadow-sm">
            <div class="card-body">
              <div class="icon-circle">O</div>
              <h5 class="stat-title">Total Orders</h5>
              <h2 class="stat-number">3,280</h2>
            </div>
          </div>
        </div>

        <!-- Revenue -->
        <div class="col-md-6 col-lg-3">
          <div class="card stat-card revenue-card shadow-sm">
            <div class="card-body">
              <div class="icon-circle">₹</div>
              <h5 class="stat-title">Revenue</h5>
              <h2 class="stat-number">₹1.25L</h2>
            </div>
          </div>
        </div>

        <!-- Pending Tasks -->
        <div class="col-md-6 col-lg-3">
          <div class="card stat-card tasks-card shadow-sm">
            <div class="card-body">
              <div class="icon-circle">T</div>
              <h5 class="stat-title">Pending Tasks</h5>
              <h2 class="stat-number">18</h2>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
