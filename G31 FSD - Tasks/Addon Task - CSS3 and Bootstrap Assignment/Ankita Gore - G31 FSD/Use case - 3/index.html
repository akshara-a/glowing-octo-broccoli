<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="login-section d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-10">
          
          <div class="login-card shadow">
            <h2 class="text-center mb-4">Login</h2>

            <form>
              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control custom-input" id="email" placeholder="Enter your email">
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control custom-input" id="password" placeholder="Enter your password">
              </div>

              <!-- Remember me + Forgot password -->
              <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label" for="remember">
                    Remember me
                  </label>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>
              </div>

              <!-- Login Button -->
              <button type="submit" class="btn btn-primary w-100 login-btn">Login</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
