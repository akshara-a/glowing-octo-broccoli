<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 18 - Breadcrumb and Pagination</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #ffffff; padding: 3rem 0; }
  .nav-card { max-width: 700px; margin: 0 auto; }
  .breadcrumb { background-color: #f4f7fd; padding: 0.8rem 1.2rem; border-radius: 0.6rem; }
  .breadcrumb-item a { color: #3b6cf6; text-decoration: none; }
  .breadcrumb-item a:hover { text-decoration: underline; }
  .breadcrumb-item.active { color: #6b7280; }
  .page-link { color: #3b6cf6; border-color: #e3e8f3; }
  .page-link:hover { background-color: #e8f0fe; color: #2952d6; }
  .page-item.active .page-link { background-color: #3b6cf6; border-color: #3b6cf6; }
  .page-item.disabled .page-link { color: #c0c8d6; }
</style>
</head>
<body>

<div class="container">
  <div class="nav-card">

    <nav aria-label="breadcrumb" class="mb-5">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item"><a href="#">Products</a></li>
        <li class="breadcrumb-item"><a href="#">Electronics</a></li>
        <li class="breadcrumb-item active" aria-current="page">Headphones</li>
      </ol>
    </nav>

    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center">
        <li class="page-item disabled">
          <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
        </li>
        <li class="page-item active"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item">
          <a class="page-link" href="#">Next</a>
        </li>
      </ul>
    </nav>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
