<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 3 - Login Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #eef2f9; min-height: 100vh; display: flex; align-items: center; }
  .login-card { background: #fff; border-radius: 1rem; box-shadow: 0 8px 24px rgba(59,108,246,0.10); padding: 2.5rem; max-width: 420px; width: 100%; }
  .login-title { font-weight: 700; color: #1b2a4a; }
  .form-control { border-radius: 0.5rem; padding: 0.6rem 0.9rem; border: 1px solid #d8e0f0; }
  .form-control:focus { border-color: #3b6cf6; box-shadow: 0 0 0 0.2rem rgba(59,108,246,0.15); }
  .btn-login { background-color: #3b6cf6; border-color: #3b6cf6; padding: 0.6rem; font-weight: 500; }
  .btn-login:hover { background-color: #2952d6; border-color: #2952d6; }
  .forgot-link { color: #3b6cf6; text-decoration: none; font-size: 0.9rem; }
  .forgot-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-center">
    <div class="login-card">
      <h3 class="login-title text-center mb-4">Login to Your Account</h3>
      <form>
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password">
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
              Remember me
            </label>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-login w-100 text-white">Login</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
