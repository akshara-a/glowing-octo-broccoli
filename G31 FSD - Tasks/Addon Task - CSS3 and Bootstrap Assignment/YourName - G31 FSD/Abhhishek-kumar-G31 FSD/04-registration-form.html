<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 4 - Registration Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #eef2f9; min-height: 100vh; padding: 2rem 0; }
  .register-card { background: #fff; border-radius: 1rem; box-shadow: 0 8px 24px rgba(59,108,246,0.10); padding: 2.5rem; max-width: 500px; width: 100%; margin: 0 auto; }
  .register-title { font-weight: 700; color: #1b2a4a; }
  .form-control { border-radius: 0.5rem; padding: 0.6rem 0.9rem; border: 1px solid #d8e0f0; }
  .form-control:focus { border-color: #3b6cf6; box-shadow: 0 0 0 0.2rem rgba(59,108,246,0.15); }
  .form-control.is-invalid { border-color: #e15554; }
  .invalid-feedback { font-size: 0.85rem; }
  .btn-register { background-color: #3b6cf6; border-color: #3b6cf6; padding: 0.6rem; font-weight: 500; }
  .btn-register:hover { background-color: #2952d6; border-color: #2952d6; }
</style>
</head>
<body>

<div class="container">
  <div class="register-card">
    <h3 class="register-title text-center mb-4">Create an Account</h3>
    <form class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
        <div class="invalid-feedback">Please enter your full name.</div>
      </div>
      <div class="mb-3">
        <label for="regEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      <div class="mb-3">
        <label for="regPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="regPassword" placeholder="Create a password" required>
        <div class="invalid-feedback">Password is required.</div>
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
        <div class="invalid-feedback">Passwords must match.</div>
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="termsCheck" required>
        <label class="form-check-label" for="termsCheck">
          I agree to the Terms and Conditions
        </label>
        <div class="invalid-feedback">You must agree before submitting.</div>
      </div>
      <button type="submit" class="btn btn-register w-100 text-white">Register</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  (function () {
    'use strict'
    var forms = document.querySelectorAll('.needs-validation')
    Array.prototype.slice.call(forms).forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
  })()
</script>
</body>
</html>
