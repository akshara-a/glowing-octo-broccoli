<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section - Use Case 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<style>
  .hero-gradient {
    background: linear-gradient(135deg, #e8f0fe 0%, #f5f9ff 50%, #eef6f3 100%);
  }

  .hero-heading {
    font-weight: 700;
    line-height: 1.15;
    color: #1b2a4a;
  }

  .hero-text {
    color: #5a6b85;
  }

  .btn-primary-custom {
    background-color: #3b6cf6;
    border-color: #3b6cf6;
    padding: 0.75rem 1.75rem;
    font-weight: 500;
  }

  .btn-primary-custom:hover {
    background-color: #2952d6;
    border-color: #2952d6;
  }

  .btn-secondary-custom {
    color: #3b6cf6;
    border-color: #3b6cf6;
    padding: 0.75rem 1.75rem;
    font-weight: 500;
  }

  .btn-secondary-custom:hover {
    background-color: #3b6cf6;
    color: #fff;
  }

  .hero-img-placeholder {
    background-color: #ffffff;
    border: 2px dashed #c3d4f0;
    border-radius: 1rem;
    height: 380px;
  }

  .hero-img-placeholder span {
    color: #8ea0c2;
    font-weight: 500;
  }

  @media (max-width: 991px) {
    .hero-img-placeholder {
      height: 280px;
    }
  }
</style>
</head>
<body>

<section class="hero-gradient">
  <div class="container py-5">
    <div class="row align-items-center g-5 py-5">

      <!-- Left Column: Text Content -->
      <div class="col-lg-6 text-center text-lg-start">
        <h1 class="hero-heading display-4 mb-3">
          Grow Your Business <br class="d-none d-lg-block">with Smarter Tools
        </h1>
        <p class="hero-text lead mb-4">
          Manage your projects, clients, and team in one simple dashboard built to save you time and reduce daily hassle.
        </p>
        <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center justify-content-lg-start">
          <button type="button" class="btn btn-primary-custom btn-lg">Get Started</button>
          <button type="button" class="btn btn-outline-primary btn-secondary-custom btn-lg">Learn More</button>
        </div>
      </div>

      <!-- Right Column: Image Placeholder -->
      <div class="col-lg-6">
        <div class="hero-img-placeholder d-flex align-items-center justify-content-center">
          <span>Image Placeholder</span>
          <img src="images (1).jpg" alt="">
        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
