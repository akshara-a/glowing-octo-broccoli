<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 16 - Progress Bars</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #f0f3f9; padding: 3rem 0; }
  .skills-card { background: #fff; border-radius: 1rem; box-shadow: 0 6px 18px rgba(0,0,0,0.06); padding: 2.5rem; max-width: 600px; margin: 0 auto; }
  .skills-title { font-weight: 700; color: #1b2a4a; margin-bottom: 2rem; }
  .skill-label { font-weight: 500; color: #2d3748; display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
  .progress { height: 10px; border-radius: 1rem; background-color: #eef1f8; margin-bottom: 1.5rem; }
  .progress-bar { border-radius: 1rem; }
  .bar-html { background-color: #e15554; }
  .bar-css { background-color: #3b6cf6; }
  .bar-bootstrap { background-color: #8b5cf6; }
  .bar-js { background-color: #f0b429; }
  .bar-csharp { background-color: #1c9b5e; }
</style>
</head>
<body>

<div class="container">
  <div class="skills-card">
    <h4 class="skills-title">Skill Proficiency</h4>

    <div class="skill-label"><span>HTML</span><span>90%</span></div>
    <div class="progress">
      <div class="progress-bar bar-html" role="progressbar" style="width: 90%;" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <div class="skill-label"><span>CSS</span><span>85%</span></div>
    <div class="progress">
      <div class="progress-bar bar-css" role="progressbar" style="width: 85%;" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <div class="skill-label"><span>Bootstrap</span><span>80%</span></div>
    <div class="progress">
      <div class="progress-bar bar-bootstrap" role="progressbar" style="width: 80%;" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <div class="skill-label"><span>JavaScript</span><span>70%</span></div>
    <div class="progress">
      <div class="progress-bar bar-js" role="progressbar" style="width: 70%;" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <div class="skill-label"><span>C#</span><span>60%</span></div>
    <div class="progress mb-0">
      <div class="progress-bar bar-csharp" role="progressbar" style="width: 60%;" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
