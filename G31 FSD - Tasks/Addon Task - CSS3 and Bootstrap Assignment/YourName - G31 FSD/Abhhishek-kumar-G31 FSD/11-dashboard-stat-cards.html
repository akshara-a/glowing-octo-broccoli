<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case 11 - Dashboard Stat Cards</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
  body { background-color: #f0f3f9; padding: 3rem 0; }
  .stat-card { background: #fff; border-radius: 1rem; box-shadow: 0 6px 18px rgba(0,0,0,0.06); padding: 1.5rem; display: flex; align-items: center; gap: 1rem; height: 100%; transition: transform 0.2s ease; }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-icon { width: 56px; height: 56px; border-radius: 0.8rem; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .icon-users { background-color: #e8f0fe; color: #3b6cf6; }
  .icon-orders { background-color: #e6f7ee; color: #1c9b5e; }
  .icon-revenue { background-color: #fff4e0; color: #c98a17; }
  .icon-tasks { background-color: #fdeaea; color: #d9534f; }
  .stat-value { font-weight: 700; color: #1b2a4a; font-size: 1.5rem; margin-bottom: 0; }
  .stat-label { color: #6b7280; font-size: 0.88rem; margin-bottom: 0; }
</style>
</head>
<body>

<div class="container">
  <div class="row g-4">
    <div class="col-sm-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon icon-users">👥</div>
        <div>
          <p class="stat-value">2,540</p>
          <p class="stat-label">Total Users</p>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon icon-orders">📦</div>
        <div>
          <p class="stat-value">1,128</p>
          <p class="stat-label">Total Orders</p>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon icon-revenue">💰</div>
        <div>
          <p class="stat-value">$48,200</p>
          <p class="stat-label">Revenue</p>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon icon-tasks">📝</div>
        <div>
          <p class="stat-value">37</p>
          <p class="stat-label">Pending Tasks</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
