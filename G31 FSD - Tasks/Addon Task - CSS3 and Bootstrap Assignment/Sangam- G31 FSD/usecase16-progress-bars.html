<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Progress Bars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .skill-card{
            max-width: 700px;
            margin: auto;
        }

        .html-bar{
            background-color: #e34c26;
        }

        .css-bar{
            background-color: #264de4;
        }

        .bootstrap-bar{
            background-color: #7952b3;
        }

        .js-bar{
            background-color: #f7df1e;
            color: black;
        }

        .csharp-bar{
            background-color: #68217a;
        }
    </style>
</head>
<body>

<div class="container my-5">

    <!-- Heading -->
    <div class="text-center mb-5">
        <h1>Skill Progress Tracker</h1>
        <p class="text-muted">
            Track your development skills
        </p>
    </div>

    <div class="card shadow p-4 skill-card">

        <!-- HTML -->
        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="fw-bold">HTML</label>
                <span>90%</span>
            </div>

            <div class="progress">
                <div class="progress-bar html-bar"
                     style="width: 90%">
                    90%
                </div>
            </div>
        </div>

        <!-- CSS -->
        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="fw-bold">CSS</label>
                <span>85%</span>
            </div>

            <div class="progress">
                <div class="progress-bar css-bar"
                     style="width: 85%">
                    85%
                </div>
            </div>
        </div>

        <!-- Bootstrap -->
        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="fw-bold">Bootstrap</label>
                <span>80%</span>
            </div>

            <div class="progress">
                <div class="progress-bar bootstrap-bar"
                     style="width: 80%">
                    80%
                </div>
            </div>
        </div>

        <!-- JavaScript -->
        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="fw-bold">JavaScript</label>
                <span>70%</span>
            </div>

            <div class="progress">
                <div class="progress-bar js-bar"
                     style="width: 70%">
                    70%
                </div>
            </div>
        </div>

        <!-- C# -->
        <div>
            <div class="d-flex justify-content-between">
                <label class="fw-bold">C#</label>
                <span>60%</span>
            </div>

            <div class="progress">
                <div class="progress-bar csharp-bar"
                     style="width: 60%">
                    60%
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
