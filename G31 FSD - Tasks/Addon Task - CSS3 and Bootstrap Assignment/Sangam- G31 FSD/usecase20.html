<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .sidebar{
            min-height: 100vh;
        }

        .menu-link{
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .menu-link:hover{
            background-color: #495057;
        }

        .dashboard-card{
            transition: 0.3s;
        }

        .dashboard-card:hover{
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 bg-dark sidebar p-3">

            <h3 class="text-white mb-4">
                Admin Panel
            </h3>

            <a href="#" class="menu-link">
                Dashboard
            </a>

            <a href="#" class="menu-link">
                Users
            </a>

            <a href="#" class="menu-link">
                Orders
            </a>

            <a href="#" class="menu-link">
                Reports
            </a>

            <a href="#" class="menu-link">
                Settings
            </a>

            <button class="btn btn-danger mt-4 w-100">
                Logout
            </button>

        </div>


        <!-- Main Content -->
        <div class="col-md-9 col-lg-10">

            <!-- Header -->
            <div class="bg-primary text-white p-3 mb-4">
                <h2>
                    Dashboard Overview
                </h2>
            </div>


            <!-- Dashboard Cards -->
            <div class="row g-4">

                <!-- Users -->
                <div class="col-md-6 col-lg-3">

                    <div class="card shadow dashboard-card h-100">

                        <div class="card-body text-center">

                            <h5>Total Users</h5>

                            <h2 class="text-primary">
                                1,250
                            </h2>

                        </div>

                    </div>

                </div>


                <!-- Orders -->
                <div class="col-md-6 col-lg-3">

                    <div class="card shadow dashboard-card h-100">

                        <div class="card-body text-center">

                            <h5>Total Orders</h5>

                            <h2 class="text-success">
                                560
                            </h2>

                        </div>

                    </div>

                </div>


                <!-- Revenue -->
                <div class="col-md-6 col-lg-3">

                    <div class="card shadow dashboard-card h-100">

                        <div class="card-body text-center">

                            <h5>Revenue</h5>

                            <h2 class="text-warning">
                                ₹75,000
                            </h2>

                        </div>

                    </div>

                </div>


                <!-- Tasks -->
                <div class="col-md-6 col-lg-3">

                    <div class="card shadow dashboard-card h-100">

                        <div class="card-body text-center">

                            <h5>Pending Tasks</h5>

                            <h2 class="text-danger">
                                18
                            </h2>

                        </div>

                    </div>

                </div>

            </div>


            <!-- Main Content Area -->
            <div class="card shadow mt-5">

                <div class="card-body">

                    <h3>
                        Welcome Admin
                    </h3>

                    <p>
                        This is the main content area where you can manage users, orders, reports, and settings.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
