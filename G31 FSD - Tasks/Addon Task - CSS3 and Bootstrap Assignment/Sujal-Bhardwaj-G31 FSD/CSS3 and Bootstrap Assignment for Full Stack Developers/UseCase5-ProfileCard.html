<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile Card</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    transition:0.4s;
}

/* Profile Card */
.profile-card{
    max-width:400px;
    margin:60px auto;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    transition:0.4s;
}

.profile-card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Profile Image */
.profile-img{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #0d6efd;
    margin-top:20px;
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .profile-card{
    background:#1f1f1f;
    color:white;
}

.dark-mode .card-text{
    color:#dcdcdc;
}

</style>
</head>
<body>

<!-- Header -->
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">

        <h2>Profile Card</h2>

        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>

    </div>

</div>

<!-- Profile Card -->
<div class="card profile-card text-center">

    <div class="card-body">

        <!-- Profile Image -->
        <img src="https://tse2.mm.bing.net/th/id/OIP.U0lavRZhl9Y5-e_-UiptAwHaHa?pid=Api&h=220&P=0"
             alt="Profile Image"
             class="profile-img">

        <!-- User Name -->
        <h3 class="mt-3">
            Sujal Bhardwaj
        </h3>

        <!-- Role -->
        <h5 class="text-primary">
            Full Stack Developer
        </h5>

        <!-- Bio -->
        <p class="card-text mt-3">
            Passionate Full Stack Developer with expertise in HTML, CSS,
            Bootstrap, JavaScript, Java, DBMS and modern web technologies.
        </p>

        <!-- Follow Button -->
        <button class="btn btn-primary px-4"
                onclick="followUser()">
            Follow
        </button>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* Follow Button */

function followUser(){

    alert("You are now following this user!");

}

/* Dark Mode Toggle */

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML="☀️ Light Mode";

        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }else{

        darkBtn.innerHTML="🌙 Dark Mode";

        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
