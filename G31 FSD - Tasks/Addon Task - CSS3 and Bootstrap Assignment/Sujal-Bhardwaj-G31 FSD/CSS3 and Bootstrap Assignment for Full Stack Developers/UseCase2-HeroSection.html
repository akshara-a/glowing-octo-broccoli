<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section with Dark Mode</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    transition: all 0.4s ease;
}

/* Hero Section */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    transition:0.4s;
}

/* Hero Image */
.hero img{
    width:100%;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .hero{
    background:linear-gradient(135deg,#1f1f1f,#343a40);
}

.dark-mode .navbar{
    background:#212529 !important;
}

.dark-mode .navbar-brand{
    color:white !important;
}

.dark-mode .btn-outline-dark{
    color:white;
    border-color:white;
}

</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            MyWebsite
        </a>

        <!-- Dark Mode Button -->
        <button id="darkBtn" class="btn btn-dark">
            🌙 Dark Mode
        </button>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero">

<div class="container">

<div class="row align-items-center">

    <!-- Left Content -->
    <div class="col-lg-6 text-center text-lg-start">

        <h1 class="display-4 fw-bold">
            Build Amazing Websites
        </h1>

        <p class="lead my-4">
            Learn HTML, CSS, Bootstrap and JavaScript to create modern responsive websites.
        </p>

        <button class="btn btn-warning btn-lg me-2">
            Get Started
        </button>

        <button class="btn btn-outline-light btn-lg">
            Learn More
        </button>

    </div>

    <!-- Right Image -->
    <div class="col-lg-6 text-center mt-5 mt-lg-0">

        <img src="https://tse3.mm.bing.net/th/id/OIP.YBr-f_yTUJvBHjv1WkQ_kAHaHa?pid=Api&h=220&P=0">

    </div>

</div>

</div>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Dark Mode Toggle

const darkBtn = document.getElementById("darkBtn");

darkBtn.addEventListener("click", function(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        darkBtn.innerHTML = "☀️ Light Mode";
        darkBtn.classList.remove("btn-dark");
        darkBtn.classList.add("btn-warning");

    }
    else{

        darkBtn.innerHTML = "🌙 Dark Mode";
        darkBtn.classList.remove("btn-warning");
        darkBtn.classList.add("btn-dark");

    }

});

</script>

</body>
</html>
